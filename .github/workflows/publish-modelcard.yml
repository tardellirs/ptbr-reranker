name: Publish model card

on:
  push:
    branches: [main]
    paths:
      - "docs/model-card.md"
      - "scripts/build_modelcard.py"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub pyyaml

      - name: Validate model card frontmatter
        run: python scripts/build_modelcard.py --validate

      - name: Publish to Hugging Face Hub
        if: github.ref == 'refs/heads/main'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ vars.HF_REPO || 'tardellirs/cross-encoder-albertina-ptbr-mmarco' }}
        run: python scripts/build_modelcard.py --publish
