# Baseline cross-encoder training config — uses only BM25 negatives (no mining).
# Reference run for ablation studies.

base_model: PORTULAN/albertina-100m-portuguese-ptbr-encoder

# Data
train_triples: data/processed/triples_bm25.parquet
collection: data/raw/mmarco/collection.tsv

# Training
num_epochs: 1
batch_size: 32             # per-device
grad_accum_steps: 2        # effective batch = 64
learning_rate: 2.0e-5
warmup_ratio: 0.1
max_length: 256
loss: cross_entropy_softmax   # alternatives: pairwise_hinge, multiple_negatives_ranking

# Optimization
optimizer: adamw
weight_decay: 0.01
gradient_checkpointing: false
mixed_precision: bf16

# Reproducibility
seed: 42

# Logging / checkpointing
output_dir: runs/baseline
eval_every_steps: 10000
save_every_steps: 10000
keep_top_k_checkpoints: 2
log_every_steps: 50

# Experiment tracking
wandb_project: ptbr-reranker
wandb_run_name: baseline-albertina100m-bm25neg
wandb_tags: [baseline, bm25-negatives, albertina-100m]

# CO2 tracking
codecarbon_enabled: true
